<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Teléfono del Padre</title>
<style>
  :root{
    --azul:#0C2B45;
    --beige:#C9A876;
    --crema:#F4ECDD;
    --shadow: rgba(0,0,0,0.3);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; width:100%;}
  body{
    font-family:Georgia, serif;
    background: linear-gradient(180deg, #0c2b45 0%, #06192c 100%);
    color:var(--crema);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    padding:16px;
    text-align:center;
  }
  .logo-header{
    width:48px; height:48px;
    border-radius:6px;
    margin:0 auto 8px;
    border:2px solid var(--beige);
    box-shadow:0 2px 8px var(--shadow);
  }
  h1{
    font-size:1.4rem;
    color:var(--beige);
    font-weight:700;
    letter-spacing:0.5px;
  }

  nav{
    display:flex;
    justify-content:center;
    gap:8px;
    padding:12px 16px;
    flex-wrap:wrap;
  }
  .tab{
    background:transparent;
    border:1.5px solid var(--beige);
    color:var(--beige);
    padding:8px 14px;
    border-radius:25px;
    cursor:pointer;
    font-family:inherit;
    font-size:0.9rem;
    transition:all 0.2s;
  }
  .tab.active{
    background:var(--beige);
    color:var(--azul);
    font-weight:bold;
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:12px 16px 30px;
    overflow-y:auto;
  }

  /* Tarjeta */
  .tarjeta{
    width:100%;
    max-width:400px;
    aspect-ratio:4/5;
    border-radius:16px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    box-shadow:0 10px 30px var(--shadow);
    position:relative;
    margin-bottom:16px;
  }
  .tarjeta::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
  }
  .tarjeta-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px;
    z-index:2;
  }
  .tarjeta-num{
    font-size:0.75rem;
    letter-spacing:2px;
    color:var(--beige);
    margin-bottom:10px;
  }
  .tarjeta-texto{
    font-size:1.5rem;
    font-weight:600;
    line-height:1.4;
    color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
  }
  .tarjeta-footer{
    margin-top:12px;
    font-size:0.8rem;
    color:var(--crema);
  }

  /* Logo pequeño en tarjeta */
  .logo-tarjeta{
    position:absolute;
    top:12px;
    right:12px;
    width:60px;
    height:60px;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 3px 8px var(--shadow);
    z-index:3;
  }
  .logo-tarjeta img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  /* Botones */
  .acciones{
    width:100%;
    max-width:400px;
    display:flex;
    gap:10px;
  }
  .btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    font-family:inherit;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    transition:transform 0.1s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{
    background:var(--beige);
    color:var(--azul);
  }
  .btn-secondary{
    background:transparent;
    border:1.5px solid var(--beige);
    color:var(--beige);
  }

  /* Secciones */
  .section{
    display:none;
    width:100%;
    max-width:500px;
  }
  .section.active{
    display:block;
  }

  /* Lista */
  .search{
    width:100%;
    padding:10px 12px;
    border-radius:20px;
    border:1.5px solid var(--beige);
    background:rgba(255,255,255,0.05);
    color:var(--crema);
    font-family:inherit;
    margin-bottom:12px;
    outline:none;
  }
  .lista{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .item{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(201,168,118,0.3);
    border-radius:10px;
    padding:12px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .item:active{background:rgba(201,168,118,0.15);}
  .item-text{
    flex:1;
  }
  .item-num{
    color:var(--beige);
    font-weight:bold;
    font-size:0.85rem;
    min-width:24px;
  }
  .item-txt{
    color:#f0e7d6;
    font-size:0.95rem;
    line-height:1.4;
  }
  .item-actions{
    display:flex;
    gap:4px;
  }
  .btn-mini{
    background:transparent;
    border:1px solid var(--beige);
    color:var(--beige);
    padding:3px 6px;
    border-radius:4px;
    font-size:0.7rem;
    cursor:pointer;
  }
  .btn-mini.del{border-color:#d9534f;color:#d9534f;}

  /* Editor */
  .form{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(201,168,118,0.3);
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
  }
  .form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:10px;
  }
  .form-group label{
    font-size:0.85rem;
    color:var(--beige);
    font-weight:500;
  }
  .form-group input,.form-group textarea{
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(201,168,118,0.25);
    color:var(--crema);
    padding:8px 10px;
    border-radius:6px;
    font-family:inherit;
    font-size:0.9rem;
    outline:none;
  }
  .form-group textarea{
    min-height:50px;
    resize:vertical;
  }
  .form-actions{
    display:flex;
    gap:8px;
  }
  .form-actions .btn{padding:10px; font-size:0.85rem;}

  /* Toast */
  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%) translateY(30px);
    background:var(--beige);
    color:var(--azul);
    padding:10px 20px;
    border-radius:20px;
    font-size:0.85rem;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:all 0.3s;
    z-index:100;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  #canvas{display:none;}

  footer{text-align:center; padding:10px; font-size:0.7rem; color:#6b7a88;}
</style>
</head>

let frasesActual = null;
let editandoId = null;

// localStorage para frases personalizadas
function getPersonalizadas(){
  return JSON.parse(localStorage.getItem('frases_pers') || '[]');
}
function savePersonalizadas(arr){
  localStorage.setItem('frases_pers', JSON.stringify(arr));
}

function obtenerTodasLasFrases(){
  const pers = getPersonalizadas();
  return [...FRASES, ...pers];
}

function cambiarTab(tab){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  if(tab === 'lista') renderLista();
  if(tab === 'editar') renderPersonalizadas();
}

function generarFrase(){
  const todas = obtenerTodasLasFrases();
  if(todas.length === 0) return;
  
  let candidatas = todas;
  if(frasesActual && todas.length > 1){
    candidatas = todas.filter(f => f.id !== frasesActual.id);
  }
  
  const frase = candidatas[Math.floor(Math.random() * candidatas.length)];
  mostrarFrase(frase);
}

function renderLista(){
  const filtro = document.getElementById('buscador').value.toLowerCase();
  const todas = obtenerTodasLasFrases();
  const filtradas = todas.filter(f =>
    f.texto.toLowerCase().includes(filtro) || String(f.id).includes(filtro)
  );
  
  const html = filtradas.length === 0 
    ? '<div style="text-align:center;color:#8a9aac;padding:30px 10px;">Sin resultados</div>'
    : filtradas.map(f => `
        <div class="item" onclick="abrirFrase(${f.id})">
          <div class="item-text">
            <span class="item-num">${f.id}.</span>
            <span class="item-txt">${f.texto}</span>
          </div>
          ${f.pers ? `<div class="item-actions">
            <button class="btn-mini" onclick="event.stopPropagation(); editarFrase(${f.id})">✏️</button>
            <button class="btn-mini del" onclick="event.stopPropagation(); delFrase(${f.id})">✕</button>
          </div>` : ''}
        </div>
      `).join('');
  
  document.getElementById('listaFrases').innerHTML = html;
}

function filtrarLista(){
  renderLista();
}

function abrirFrase(id){
  const f = obtenerTodasLasFrases().find(x => x.id === id);
  if(f) mostrarFrase(f);
  cambiarTab('recibir');
}

function renderPersonalizadas(){
  const pers = getPersonalizadas();
  const html = pers.length === 0
    ? '<div style="text-align:center;color:#8a9aac;padding:20px 10px;">No hay frases personalizadas</div>'
    : pers.map(f => `
        <div class="item">
          <div class="item-text">
            <span class="item-num">${f.id}.</span>
            <span class="item-txt">${f.texto}</span>
          </div>
          <div class="item-actions">
            <button class="btn-mini" onclick="editarFrase(${f.id})">✏️</button>
            <button class="btn-mini del" onclick="delFrase(${f.id})">✕</button>
          </div>
        </div>
      `).join('');
  
  document.getElementById('listaPersonalizadas').innerHTML = html;
}

function editarFrase(id){
  const f = getPersonalizadas().find(x => x.id === id);
  if(!f) return;
  editandoId = id;
  document.getElementById('edNum').value = id;
  document.getElementById('edTxt').value = f.texto;
  cambiarTab('editar');
}

function delFrase(id){
  if(!confirm('¿Eliminar?')) return;
  const pers = getPersonalizadas().filter(f => f.id !== id);
  savePersonalizadas(pers);
  renderPersonalizadas();
  renderLista();
  mostrarToast('Eliminada');
}

function guardarFrase(){
  const num = parseInt(document.getElementById('edNum').value);
  const txt = document.getElementById('edTxt').value.trim();
  
  if(!num || !txt){
    mostrarToast('Completa los campos');
    return;
  }
  
  let pers = getPersonalizadas();
  
  if(editandoId === null){
    pers.push({id: num, texto: txt, pers: true});
    mostrarToast('Agregada');
  } else {
    const idx = pers.findIndex(f => f.id === editandoId);
    if(idx >= 0){
      pers[idx].texto = txt;
      mostrarToast('Actualizada');
    }
  }
  
  savePersonalizadas(pers);
  limpiarForm();
  renderPersonalizadas();
  renderLista();
}

function limpiarForm(){
  editandoId = null;
  document.getElementById('edNum').value = '';
  document.getElementById('edTxt').value = '';
}

async function compartir(){
  if(!frasesActual) return;
  
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 480;
  canvas.height = 600;
  
  const bg = new Image();
  bg.onload = () => {
    ctx.drawImage(bg, 0, 0, 480, 600);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, 480, 600);
    
    ctx.fillStyle = '#C9A876';
    ctx.font = 'bold 16px Georgia';
    ctx.fillText('Frase Nº ' + frasesActual.id, 25, 130);
    
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 26px Georgia';
    const palabras = frasesActual.texto.split(' ');
    let linea = '', y = 180;
    for(let pal of palabras){
      const test = linea + (linea ? ' ' : '') + pal;
      if(ctx.measureText(test).width > 430 && linea){
        ctx.fillText(linea, 25, y);
        linea = pal; y += 34;
      } else {
        linea = test;
      }
    }
    if(linea) ctx.fillText(linea, 25, y);
    
    ctx.fillStyle = '#E3D6BC';
    ctx.font = '13px Georgia';
    ctx.fillText('El Teléfono del Padre', 25, 570);
    
    canvas.toBlob(blob => {
      const txt = `"${frasesActual.texto}"\n\n— Frase Nº ${frasesActual.id}\nEl Teléfono del Padre`;
      
      if(navigator.share){
        navigator.share({title: 'El Teléfono del Padre', text: txt}).catch(() => {});
      } else {
        navigator.clipboard.writeText(txt);
        mostrarToast('Copiado');
      }
    }, 'image/png');
  };

  const t = document.getElementById('toast');

  t.classList.add('show');

}
